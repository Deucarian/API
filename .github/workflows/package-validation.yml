name: Package Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate UPM package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package layout
        run: node Tools/validate-package.js
