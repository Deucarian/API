name: Release Package Artifact

on:
  # Git-only stable distribution is active for now; tag/GitHub releases are deferred.
  # Do not trigger release mode without a dedicated release wave.
  workflow_dispatch:
    inputs:
      confirm_release:
        description: "Type exactly: I understand this publishes a Deucarian package"
        required: true
        type: string
        default: ""

jobs:
  package:
    name: Create package artifact
    runs-on: ubuntu-latest

    steps:
      - name: Git-only release policy guard
        shell: bash
        env:
          INPUT_CONFIRM_RELEASE: ${{ inputs.confirm_release }}
        run: |
          if [ "$INPUT_CONFIRM_RELEASE" != "I understand this publishes a Deucarian package" ]; then
            echo "::error::Release workflows require exact confirm_release acknowledgement."
            exit 1
          fi
          echo "::error::Git-only stable distribution is active for now; tag and GitHub release creation are deferred to a dedicated release wave."
          exit 1
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate package layout
        run: node Tools/validate-package.js

      - name: Create package zip
        run: |
          mkdir -p artifacts
          git archive --format zip --output "artifacts/api-${GITHUB_REF_NAME}.zip" HEAD

      - name: Upload package zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-${{ github.ref_name }}
          path: artifacts/api-${{ github.ref_name }}.zip
