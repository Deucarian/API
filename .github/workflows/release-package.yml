name: Release Package Artifact

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Create package artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package layout
        run: node Tools/validate-package.js

      - name: Create package zip
        run: |
          mkdir -p artifacts
          git archive --format zip --output "artifacts/api-helper-${GITHUB_REF_NAME}.zip" HEAD

      - name: Upload package zip
        uses: actions/upload-artifact@v4
        with:
          name: api-helper-${{ github.ref_name }}
          path: artifacts/api-helper-${{ github.ref_name }}.zip
